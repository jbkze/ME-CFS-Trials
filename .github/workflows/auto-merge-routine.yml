name: Integrate routine data into main

# The scheduled ME/CFS research-watch Routine commits its results on a `claude/*`
# branch when it cannot push to `main` directly. This workflow copies that run's
# OUTPUT — data files, the whole `literature/` archive, the generated views, the
# changelog and the sources list — onto `main`, so the GitHub Pages dashboard and
# the literature archive update with no manual merge, then retires the branch.
#
# THE BUG THIS FIXES: the previous version allow-listed only the five data/
# generated files, so any run that also added a paper under `literature/` tripped
# its "non-data file -> skip" guard and was silently left un-merged (green, but no
# merge, no delete). The allow-list now lives in
# scripts/integrate_routine_branches.sh and includes the entire `literature/` tree.
#
# SAFETY: the script copies ONLY routine-output files and NEVER runs the branch's
# code, so it is safe with a write token. A branch that also changes development
# files (scripts, .github/, docs/index.html, CLAUDE.md, data/schema.json, …) is
# recognised as a human dev branch and left for manual review (loud warning, never
# silently dropped, never deleted).
#
# TRIGGERS:
#   * push to claude/**     -> integrate that branch immediately.
#   * schedule + manual run -> sweep EVERY claude/* branch, so a run whose push
#     event was missed is still integrated within hours. This scheduled sweep is
#     the safety net that makes "a run created a branch but it never merged" not
#     recur, even if a single push event is dropped.

on:
  push:
    branches:
      - 'claude/**'
  schedule:
    - cron: '17 */6 * * *'   # every 6 hours — catch any orphaned routine branch
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: integrate-routine-data
  cancel-in-progress: false

jobs:
  integrate:
    # On a push: ignore branch-deletion events and the human development branch.
    # On schedule/dispatch: always run the full sweep.
    if: >-
      github.event_name != 'push' ||
      (github.event.deleted != true && github.ref_name != 'claude/nice-einstein-yqeyjo')
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Integrate routine branch(es) into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DEV_BRANCH: claude/nice-einstein-yqeyjo
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            bash scripts/integrate_routine_branches.sh "${{ github.ref_name }}"
          else
            bash scripts/integrate_routine_branches.sh --all
          fi
