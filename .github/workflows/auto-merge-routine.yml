name: Integrate routine data into main

# The scheduled ME/CFS research-watch Routine commits its results on a `claude/*`
# branch whenever it can't push to the default branch directly. It does not
# reliably open a PR (some runs only push the branch and file an issue), so this
# workflow triggers on the **branch push** and integrates the run's data into
# `main` — so the GitHub Pages dashboard updates with no manual step — then
# deletes the run branch so no stragglers pile up.
#
# Safety:
#   * Ignores branch-deletion events (so deleting the branch can't re-trigger it).
#   * Ignores the human development branch.
#   * Acts ONLY if the push changed nothing outside the routine's data/generated
#     files (data/trials.json, data/papers.json, TRIALS.md, docs/dashboard.json,
#     checks/CHANGELOG.md). Any other change → it's development, left untouched.
#   * Never executes the branch's code — it only copies those data files — so it
#     is safe even though it runs with a write token.
#
# The clean alternative is to enable "Allow unrestricted branch pushes" on the
# Routine, which lets runs commit straight to `main` and makes this unnecessary.

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

concurrency:
  group: integrate-routine-data
  cancel-in-progress: false

jobs:
  integrate:
    if: >-
      github.event.deleted != true &&
      github.ref_name != 'claude/nice-einstein-yqeyjo'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Integrate data-only routine pushes into main, then delete the branch
        env:
          BRANCH: ${{ github.ref_name }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          ALLOWED="data/trials.json data/papers.json TRIALS.md docs/dashboard.json checks/CHANGELOG.md"

          git fetch origin "$BRANCH"
          CHANGED="$(git diff --name-only origin/main..."$HEAD_SHA" || true)"
          if [ -z "$CHANGED" ]; then
            echo "No changes versus main; nothing to integrate."
            exit 0
          fi
          echo "Files changed on $BRANCH versus main:"; echo "$CHANGED"

          # If anything outside the data set changed, this is development — skip
          # (and do NOT delete the branch).
          for f in $CHANGED; do
            case " $ALLOWED " in
              *" $f "*) : ;;
              *) echo "Non-data file '$f' changed → not a routine data push; skipping."; exit 0 ;;
            esac
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for f in $ALLOWED; do
            git checkout "$HEAD_SHA" -- "$f" 2>/dev/null || echo "  ($f absent on branch — skipping)"
          done

          if git diff --cached --quiet; then
            echo "main already matches the run's data; nothing to commit."
          else
            git commit -m "Integrate routine data from ${BRANCH}" -m "Auto-applied so the dashboard updates without a manual merge. Source: ${BRANCH} @ ${HEAD_SHA}. Only data/generated files are copied."
            git push origin HEAD:main
            echo "Integrated routine data into main."
          fi

          # The run branch is fully integrated — delete it so it doesn't linger.
          git push origin --delete "$BRANCH" || echo "Could not delete $BRANCH (already gone?)."
