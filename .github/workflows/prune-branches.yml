name: Prune integrated routine branches

# Housekeeping backstop. The integration workflow already deletes each run branch
# right after copying its data onto main; this catches any leftovers.
#
# DATA-LOSS GUARD (the important change): a branch is deleted ONLY once its data is
# provably on `main`. The integration commit records the branch tip as
# "… @ <sha>", so before deleting we require a commit on main that references this
# branch's CURRENT tip sha. A branch that has never been integrated (e.g. one the
# integration step skipped, or a dev branch) is KEPT and flagged — never deleted
# with un-merged data. This is what previously could have lost a run's results.
#
# Also kept: the human development branch, any open-PR head, and (on the schedule)
# branches whose tip is younger than 30 min. Run manually with "force" to ignore
# the age guard (but the integration-marker guard always applies).

on:
  push:
    branches:
      - main
  schedule:
    - cron: '23 4 * * 1'
  workflow_dispatch:
    inputs:
      force:
        description: 'Ignore the 30-minute age guard (the integration-marker guard still applies)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: prune-branches
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Delete only branches whose data is already on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DEV_BRANCH: claude/nice-einstein-yqeyjo
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          set -uo pipefail
          OPEN_PR_HEADS="$(gh pr list --repo "$REPO" --state open --json headRefName -q '.[].headRefName' | sort -u)"
          NOW="$(date +%s)"
          BRANCHES="$(gh api --paginate "repos/$REPO/branches" -q '.[].name' | grep '^claude/' || true)"
          if [ -z "$BRANCHES" ]; then echo "No claude/* branches."; exit 0; fi

          for BR in $BRANCHES; do
            if [ "$BR" = "$DEV_BRANCH" ]; then echo "keep (dev): $BR"; continue; fi
            if printf '%s\n' "$OPEN_PR_HEADS" | grep -qx "$BR"; then echo "keep (open PR): $BR"; continue; fi

            SHA="$(gh api "repos/$REPO/commits/$BR" -q '.sha' 2>/dev/null || echo '')"
            if [ -z "$SHA" ]; then echo "keep (cannot resolve tip): $BR"; continue; fi

            if [ "$FORCE" != "true" ]; then
              ISO="$(gh api "repos/$REPO/commits/$BR" -q '.commit.committer.date' 2>/dev/null || echo '')"
              if [ -n "$ISO" ]; then
                TIP="$(date -d "$ISO" +%s 2>/dev/null || echo 0)"
                if [ "$TIP" -ne 0 ] && [ "$(( NOW - TIP ))" -lt 1800 ]; then
                  echo "keep (tip <30 min old): $BR"; continue
                fi
              fi
            fi

            # DATA-LOSS GUARD: require an integration marker for this exact tip sha.
            if git log origin/main --grep="$SHA" --max-count=1 --pretty=format:%H | grep -q .; then
              echo "deleting (integrated: $SHA on main): $BR"
              gh api -X DELETE "repos/$REPO/git/refs/heads/$BR" && echo "  deleted" || echo "  delete failed"
            else
              echo "::warning title=Un-integrated routine branch kept::$BR ($SHA) is NOT on main yet — not deleting. The integration workflow should pick it up; investigate if it persists."
            fi
          done
